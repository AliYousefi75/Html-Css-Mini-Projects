<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.0.1/remixicon.css"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Profile Card With Tooltip</title>
  </head>
  <body>

    <div class="container">
      <article class="card-article">
        
        <div class="card-profile">
          <img
            class="card-profile-img"
            src="./assets/images/profile.png"
            alt="profile-image"
          />
        </div>

        
        <div class="card-tooltip">
          <div class="card-content">
            <header class="card-header">
              <span>Social</span>

              <div class="card-socials">
                <a href="https://www.linkedin.com/" target="_blank">
                  <i class="ri-linkedin-box-line"></i>
                </a>

                <a href="https://github.com/" target="_blank">
                  <i class="ri-github-fill"></i>
                </a>

                <a href="https://dribbble.com/" target="_blank">
                  <i class="ri-dribbble-line"></i>
                </a>
              </div>
            </header>

            <div class="card-data">
              <div class="card-image">
                <div class="card-mask">
                  <img src="./assets/images/profile.png" alt="" />
                </div>
                <span class="card-status"></span>
              </div>

              <h2 class="card-name">Emma Walker</h2>
              <h3 class="card-profession">Web designer</h3>
              <a href="#" class="card__button">
                <i class="ri-chat-3-line"></i> <span>Send Message</span>
              </a>
            </div>
          </div>
        </div>
      </article>
    </div>
  </body>
</html>
