<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <title>Food Banner</title>
  </head>
  <body>
    <div class="container">
      <div class="img-container">
        <img src="./assets/bg_image.png" alt="" />
      </div>
      <div class="content">
        <img src="./assets/burger.png" alt="">
        <img src="./assets/tomato.png" alt="">
        <img src="./assets/tomato.png" alt="">
        <img src="./assets/pizza.png" alt="">
        <img src="./assets/momo.png" alt="">
        <img src="./assets/leaf.png" alt="">
        <div class="center-content">
          <section class="text-content">
            <h1>
              Better food <br />
              for more people
            </h1>
            <p>
              For over a decade, we’ve enabled our customers to discover new
              tastes, delivered right to their doorstep
            </p>
          </section>
          <section class="footer">
            <div class="restaurants">
                <img src="./assets/house.png" alt="">
                <div class="data">
                    <span>3,000,000+</span>
                    <span>Restaurants</span>
                </div>
            </div>
            <div class="cities">
                <img src="./assets/location.png" alt="">
                <div class="data">
                    <span>800+</span>
                    <span>cities</span>
                </div>
            </div>
            <div class="restaurants">
                <img src="./assets/banner.png" alt="">
                <div class="data">
                    <span>3 billion+</span>
                    <span>orders delivered</span>
                </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </body>
</html>
