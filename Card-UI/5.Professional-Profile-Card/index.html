<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Profile Card</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="profile-card">
        <div class="header">
            <img src="./assets/user.jpg" alt="profile">
            <button class="follow-botton">FOLLOW</button>
        </div>
        <div class="content">
            <div class="content-left">
                <h1>Jack Dep</h1>
                <p>@Dejak</p>
                <hr>
                <div class="media">
                    <div class="followers">
                        <span class="count">11.5k</span>
                        <span class="text">Followers</span>
                    </div>
                    <div class="avatars">
                        <img src="./assets/profile-pic-1.jpg" alt="avatar">
                        <img src="./assets/profile-pic-2.jpg" alt="avatar">
                        <img src="./assets/profile-pic-3.jpg" alt="avatar">
                        <img src="./assets/profile-pic-4.jpg" alt="avatar">
                    </div>
                </div>

            </div>
            
        </div>
    </div>
    

    





</body>
</html>
